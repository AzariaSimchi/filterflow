version: "3.9"

services:
  db:
    image: postgres:16
    container_name: filterflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: filterflow
      POSTGRES_PASSWORD: filterflow
      POSTGRES_DB: filterflow
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: filterflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: filterflow_opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  mailhog:
    image: mailhog/mailhog
    container_name: filterflow_mailhog
    restart: unless-stopped
    ports:
      - "8025:8025"

volumes:
  db_data:
  opensearch_data:
    backend:
    build: ./backend
    container_name: filterflow_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - db
      - redis
      - opensearch
    command: npm run dev
